name: CI Smoke (P27)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path trainer/requirements.txt) {
            python -m pip install -r trainer/requirements.txt
          }

      - name: Status publishing smoke
        shell: pwsh
        run: |
          python -m trainer.experiments.status_publish --trends-root docs/artifacts/trends --artifacts-root docs/artifacts --out-root docs/artifacts/status

      - name: README badge refresh dry-run
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/update_readme_badges.ps1 -DryRun

      - name: Dashboard build smoke
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/build_dashboard.ps1

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-smoke-artifacts
          path: |
            docs/artifacts/status/latest_status.json
            docs/artifacts/status/latest_badges.json
            docs/artifacts/status/latest_dashboard_data.json
            docs/dashboard/data/latest.json
            docs/dashboard/data/latest.js
