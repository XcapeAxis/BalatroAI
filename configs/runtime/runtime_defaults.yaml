schema: p49_runtime_defaults_v1
defaults:
  device: auto
  gpu_id: 0
  amp_enabled: true
  bf16_enabled: false
  grad_accum_steps: 1
  batch_size: 128
  micro_batch_size: 128
  num_dataloader_workers: 2
  pin_memory: true
  prefetch_factor: 2
  rollout_device: cpu
  learner_device: cuda
  max_gpu_memory_mb: 0
  oom_fallback_policy: reduce_batch
  torch_compile_enabled: false
  matmul_precision: high
  checkpoint_interval: 1
  log_interval: 1
