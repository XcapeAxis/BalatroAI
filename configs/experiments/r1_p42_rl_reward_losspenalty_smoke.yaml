schema: p42_ppo_lite_config_v1

output_artifacts_root: docs/artifacts/research/r1_rl_train

seeds:
  - AAAAAAA
  - BBBBBBB

env:
  backend: sim
  timeout_sec: 8.0
  max_steps_per_episode: 180
  max_auto_steps: 8
  max_ante: 0
  auto_advance: true
  reward:
    score_delta_weight: 1.0
    survival_bonus: 0.02
    terminal_win_bonus: 0.6
    terminal_loss_penalty: 1.2
    invalid_action_penalty: 0.2
    clip_abs: 2.5
    penalize_requested_invalid: true
    invalid_action_mode: fallback_first_legal

rollout:
  episodes_per_seed: 2
  max_steps_per_episode: 100
  total_steps_cap: 480
  early_stop_invalid_rate: 0.35
  min_steps_before_early_stop: 64

evaluation:
  seeds:
    - AAAAAAA
    - BBBBBBB
  episodes_per_seed: 1
  max_steps_per_episode: 120
  greedy: true
  out_root: docs/artifacts/research/r1_eval

diagnostics:
  out_root: docs/artifacts/research/r1_diagnostics
  action_topk: 16

train:
  ppo_epochs: 2
  minibatch_size: 64
  clip_range: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  entropy_coef: 0.008
  value_coef: 0.5
  lr: 0.00025
  grad_clip_norm: 0.5
  normalize_advantage: true
  max_updates: 3
  invalid_action_warn_threshold: 0.10
  max_kl_warn: 0.18
  nan_fail_fast: true
