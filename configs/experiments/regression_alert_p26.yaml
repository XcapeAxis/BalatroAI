{
  "schema": "p26_regression_alert_config_v1",
  "baseline_window": 6,
  "min_points": 3,
  "hysteresis": 0.03,
  "hard_multiplier": 2.0,
  "include_metrics": [
    "avg_ante_reached",
    "median_ante_reached",
    "win_rate",
    "runtime_seconds",
    "flake_score"
  ],
  "metrics": {
    "avg_ante_reached": {
      "direction": "higher_better",
      "hysteresis": 0.05,
      "hard_hysteresis": 0.10
    },
    "median_ante_reached": {
      "direction": "higher_better",
      "hysteresis": 0.05,
      "hard_hysteresis": 0.12
    },
    "win_rate": {
      "direction": "higher_better",
      "hysteresis": 0.02,
      "hard_hysteresis": 0.05
    },
    "runtime_seconds": {
      "direction": "lower_better",
      "hysteresis": 0.03,
      "hard_hysteresis": 0.08
    },
    "flake_score": {
      "direction": "lower_better",
      "hysteresis": 0.10,
      "hard_hysteresis": 0.30
    }
  },
  "noisy_filters": {
    "flake_statuses": [
      "flake_fail"
    ],
    "risk_statuses": [
      "high_risk",
      "regression"
    ],
    "statuses": [
      "skip"
    ]
  }
}
