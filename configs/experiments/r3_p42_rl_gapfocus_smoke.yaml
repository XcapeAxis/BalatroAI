schema: p42_ppo_lite_config_v1

output_artifacts_root: docs/artifacts/research/r3_training
curriculum_config: configs/experiments/r3_p44_curriculum_compound_sourcequota.yaml

seeds:
  - AAAAAAA
  - BBBBBBB
  - CCCCCCC
  - DDDDDDD

env:
  backend: sim
  timeout_sec: 8.0
  max_steps_per_episode: 240
  max_auto_steps: 8
  max_ante: 0
  auto_advance: true
  reward:
    score_delta_weight: 0.96
    survival_bonus: 0.05
    terminal_win_bonus: 0.80
    terminal_loss_penalty: 0.80
    invalid_action_penalty: 0.12
    clip_abs: 2.5
    penalize_requested_invalid: true
    invalid_action_mode: fallback_first_legal

rollout:
  episodes_per_seed: 6
  max_steps_per_episode: 160
  total_steps_cap: 2200
  early_stop_invalid_rate: 0.35
  min_steps_before_early_stop: 64

evaluation:
  seeds:
    - AAAAAAA
    - BBBBBBB
    - CCCCCCC
    - DDDDDDD
  episodes_per_seed: 2
  max_steps_per_episode: 180
  greedy: true
  out_root: docs/artifacts/research/r3_eval

diagnostics:
  out_root: docs/artifacts/research/r3_diagnostics
  action_topk: 16

hard_case_sampling:
  enabled: true
  failure_pack_manifest: ""
  max_failure_cases: 96
  max_failure_seeds: 10
  seed_replay_factor: 4
  include_base_seed: true
  preserve_seed_identity: true
  prioritize_failure_types:
    - slice_coverage_gap_seed
    - triage_degraded_slice
    - candidate_slice_failure_seed
    - compound_slice_failure_seed
    - champion_regression_segment
    - low_score_quantile
  balance_across_failure_types: true
  max_failures_per_type: 8
  max_failures_per_seed: 4
  replay_weight_scale: 1.26
  bucket_sampling_weights:
    resource_pressure_misplay: 1.46
    shop_or_economy_misallocation: 1.44
    discard_mismanagement: 1.08
    position_sensitive_misplay: 1.18
    stateful_joker_misplay: 1.18
    low_score_survival: 1.16
    risk_undercommit: 0.82
    early_collapse: 1.06
  bucket_quota_caps:
    resource_pressure_misplay: 5
    shop_or_economy_misallocation: 5
    discard_mismanagement: 4
    position_sensitive_misplay: 4
    stateful_joker_misplay: 4
    low_score_survival: 5
    risk_undercommit: 4
    early_collapse: 4
  bucket_minimum_counts:
    resource_pressure_misplay: 1
    shop_or_economy_misallocation: 1
    low_score_survival: 1
    early_collapse: 1
  source_type_sampling_weights:
    arena_slice_gap_seed: 1.42
    arena_candidate_slice_seed: 1.24
    arena_compound_slice_seed: 1.08
    arena_failure_mining: 0.88
  source_type_minimum_counts:
    arena_slice_gap_seed: 2
    arena_candidate_slice_seed: 1
  source_type_quota_caps:
    arena_slice_gap_seed: 5
    arena_candidate_slice_seed: 4
    arena_compound_slice_seed: 3
    arena_failure_mining: 4
  slice_sampling_weights:
    slice_stage:early: 1.22
    slice_resource_pressure:high: 1.44
    slice_resource_pressure:medium: 1.20
    slice_action_type:shop: 1.42
    slice_action_type:discard: 1.10
  slice_minimum_counts:
    slice_stage:early: 1
    slice_action_type:shop: 1
    slice_resource_pressure:high: 1
  slice_quota_caps:
    slice_stage:early: 8
    slice_action_type:shop: 6
    slice_action_type:discard: 6
    slice_resource_pressure:high: 8
  risk_tag_sampling_weights:
    resource_tight: 1.26
    low_score_tail: 1.14
    early_collapse: 1.06
  risk_tag_quota_caps:
    resource_tight: 6
    low_score_tail: 5
    early_collapse: 5

self_imitation:
  enabled: false
  replay_ratio: 0.0

train:
  ppo_epochs: 2
  minibatch_size: 64
  clip_range: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  entropy_coef: 0.01
  value_coef: 0.5
  lr: 0.00025
  grad_clip_norm: 0.5
  normalize_advantage: true
  max_updates: 3
  invalid_action_warn_threshold: 0.12
  max_kl_warn: 0.20
  nan_fail_fast: true
