schema: p40_candidate_train_config_v1
candidate_modes:
  - rl_ppo_lite
  - selfsup_warm_bc
allow_legacy_fallback: false
legacy_fallback_modes:
  - bc_finetune

output:
  artifacts_root: docs/artifacts/p40/candidate_train

replay_mix_manifest: ""
rl_config: configs/experiments/p42_rl_nightly.yaml

seeds:
  - AAAAAAA
  - BBBBBBB
  - CCCCCCC
  - DDDDDDD

training:
  epochs: 2
  batch_size: 96
  lr: 0.001
  timeout_sec: 2400
  max_rows_per_seed: 1200
  prefer_source_types:
    - p13_dagger_or_real
    - arena_failures
    - selfsup_replay
