      invalid_action_penalty: 0.12
    rollout:
      max_steps: 110
    difficulty:
      max_ante: 1
      stake: WHITE

  stage3_midrisk:
    source_sampling_weights:
      self_play: 0.55
      replay_mix: 0.20
      arena_failures: 0.25
    reward:
      survival_bonus: 0.02
