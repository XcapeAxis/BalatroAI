schema: p22_experiment_config_v1

budget:
  max_wall_time_minutes: 120
  max_episodes: 500
  max_seeds: 12
  max_concurrent_workers: 1

seeds:
  base_seed: P22BASE
  regression_fixed:
    - AAAAAAA
    - BBBBBBB
    - CCCCCCC
    - DDDDDDD
    - EEEEEEE
    - FFFFFFF
    - GGGGGGG
    - HHHHHHH
  extra_random: 4

seed_policy:
  version: p34.p22.v1
  base_seed: P22BASE
  regression_smoke:
    - AAAAAAA
    - BBBBBBB
    - CCCCCCC
    - DDDDDDD
  train_default:
    - AAAAAAA
    - BBBBBBB
    - CCCCCCC
    - DDDDDDD
    - EEEEEEE
    - FFFFFFF
    - GGGGGGG
    - HHHHHHH
  eval_default:
    - AAAAAAA
    - BBBBBBB
    - CCCCCCC
    - DDDDDDD
    - EEEEEEE
    - FFFFFFF
  nightly_extra_random: 4

experiment_groups:
  ssl_pretrain_v1:
    description: "P37 SSL state encoder pretraining + probe"
    variants:
      - id: quick_ssl_pretrain_v1
        algo: ssl_contrastive
        epochs: 2
        seeds:
          - AAAAAAA
          - BBBBBBB
          - CCCCCCC
      - id: quick_ssl_probe_v1
        algo: ssl_linear_probe
        epochs: 8
        seeds:
          - AAAAAAA
          - BBBBBBB
          - CCCCCCC
      - id: ssl_pretrain_medium_v1
        algo: ssl_contrastive
        epochs: 4
        seeds:
          - AAAAAAA
          - BBBBBBB
          - CCCCCCC
          - DDDDDDD
  rl_selfplay_v1:
    description: "RL self-play skeleton"
    variants:
      - id: rl_ppo_smoke
        algo: ppo
        episodes: 10
        seeds:
          - AAAAAAA
          - BBBBBBB
      - id: rl_ppo_medium
        algo: ppo
        episodes: 50
        seeds:
          - AAAAAAA
          - BBBBBBB
          - CCCCCCC
  closed_loop_improvement_v1:
    description: "P40 closed-loop improvement (replay mix + failure mining + arena-gated candidate training)"
    variants:
      - id: p40_closed_loop_smoke
        algo: closed_loop_v1
        seeds:
          - AAAAAAA
          - BBBBBBB
      - id: p40_closed_loop_nightly
        algo: closed_loop_v1
        seeds:
          - AAAAAAA
          - BBBBBBB
          - CCCCCCC
          - DDDDDDD
  closed_loop_improvement_v2:
    description: "P41 closed-loop v2 (lineage + curriculum + slice-aware gating + triage)"
    variants:
      - id: p41_closed_loop_v2_smoke
        algo: closed_loop_v2
        seeds:
          - AAAAAAA
          - BBBBBBB
      - id: p41_closed_loop_v2_nightly
        algo: closed_loop_v2
        seeds:
          - AAAAAAA
          - BBBBBBB
          - CCCCCCC
          - DDDDDDD
  rl_candidate_pipeline_v1:
    description: "P42 RL candidate pipeline (env adapter + rollout + PPO-lite + closed-loop gating)"
    variants:
      - id: p42_rl_candidate_smoke
        algo: rl_candidate_v1
        seeds:
          - AAAAAAA
          - BBBBBBB
      - id: p42_rl_candidate_nightly
        algo: rl_candidate_v1
        seeds:
          - AAAAAAA
          - BBBBBBB
          - CCCCCCC
          - DDDDDDD
  distributed_rl_candidate_v1:
    description: "P44 distributed self-play RL + curriculum + arena-gated evaluation"
    variants:
      - id: p44_rl_smoke
        algo: p44_distributed_rl
        seeds:
          - AAAAAAA
          - BBBBBBB
      - id: p44_rl_nightly
        algo: p44_distributed_rl
        seeds:
          - AAAAAAA
          - BBBBBBB
          - CCCCCCC
          - DDDDDDD
  imagination_augmented_candidate_v1:
    description: "P46 Dyna-style imagination augmentation with uncertainty-gated world-model rollouts"
    variants:
      - id: p46_imagination_smoke
        algo: imagination_augmented_candidate
        seeds:
          - AAAAAAA
          - BBBBBBB
      - id: p46_imagination_nightly
        algo: imagination_augmented_candidate
        seeds:
          - AAAAAAA
          - BBBBBBB
          - CCCCCCC
          - DDDDDDD
  world_model_search_v1:
    description: "P47 uncertainty-aware world-model reranking and short-horizon lookahead"
    variants:
      - id: p47_wm_search_smoke
        algo: world_model_rerank_eval
        seeds:
          - AAAAAAA
          - BBBBBBB
      - id: p47_wm_search_nightly
        algo: world_model_rerank_eval
        seeds:
          - AAAAAAA
          - BBBBBBB
          - CCCCCCC
          - DDDDDDD
  adaptive_hybrid_controller_v1:
    description: "P48 adaptive hybrid routing across policy, search, heuristic, and wm-rerank"
    variants:
      - id: p48_hybrid_controller_smoke
        algo: hybrid_controller_eval
        seeds:
          - AAAAAAA
          - BBBBBBB
      - id: p48_hybrid_controller_nightly
        algo: hybrid_controller_eval
        seeds:
          - AAAAAAA
          - BBBBBBB
          - CCCCCCC
          - DDDDDDD
  gpu_mainline_v1:
    description: "P49 GPU mainline templates with CPU rollout/GPU learner, readiness guard, and dashboards"
    variants:
      - id: p49_gpu_mainline_smoke
        algo: gpu_mainline_eval
        seeds:
          - AAAAAAA
          - BBBBBBB
      - id: p49_gpu_mainline_nightly
        algo: gpu_mainline_eval
        seeds:
          - AAAAAAA
          - BBBBBBB
          - CCCCCCC
          - DDDDDDD
  real_cuda_validation_v1:
    description: "P50 real CUDA validation templates with benchmark-backed single-GPU profiles"
    variants:
      - id: p50_gpu_validation_smoke
        algo: p50_gpu_validation
        seeds:
          - AAAAAAA
          - BBBBBBB
      - id: p50_gpu_validation_nightly
        algo: p50_gpu_validation
        seeds:
          - AAAAAAA
          - BBBBBBB
          - CCCCCCC
          - DDDDDDD
  checkpoint_registry_campaign_v1:
    description: "P51 checkpoint registry + resumeable nightly campaign orchestration"
    variants:
      - id: p51_registry_smoke
        algo: p51_registry_campaign
        seeds:
          - AAAAAAA
          - BBBBBBB
      - id: p51_resumeable_nightly
        algo: p51_registry_campaign
        seeds:
          - AAAAAAA
          - BBBBBBB
          - CCCCCCC
          - DDDDDDD
  legacy_bc_dagger_probe:
    description: "Legacy BC/DAgger baseline probes (non-default)"
    variants:
      - id: legacy_bc_dagger_probe
        algo: bc_dagger_probe
        seeds:
          - AAAAAAA
      - id: legacy_bc_dagger_smoke
        algo: bc_dagger_smoke
        seeds:
          - AAAAAAA

matrix:
  - id: quick_baseline
    name: quick_baseline
    backend: sim
    category: required_validation
    default_enabled: true
    policy: baseline
    seed_mode: regression_fixed
    seed_set_name: regression_smoke
    gate_flag: RunFast
    stages:
      sanity: true
      gate: true
      dataset: false
      train: false
      eval: true
    eval:
      mode: synthetic
      primary_metric_bias: 0.000

  - id: quick_candidate
    name: quick_candidate
    backend: sim
    category: required_validation
    default_enabled: true
    policy: candidate
    seed_mode: nightly
    seed_set_name: eval_default
    gate_flag: RunFast
    stages:
      sanity: true
      gate: true
      dataset: false
      train: false
      eval: true
    eval:
      mode: synthetic
      primary_metric_bias: 0.030

  - id: quick_selfsup_pretrain
    name: quick_selfsup_pretrain
    backend: sim
    policy: selfsup
    experiment_type: selfsup_pretrain
    seed_mode: regression_fixed
    seed_set_name: contract_regression
    seeds:
      - AAAAAAA
      - BBBBBBB
      - CCCCCCC
    gate_flag: RunFast
    modes:
      quick: true
      gate: true
      nightly: true
    stages:
      sanity: true
      gate: false
      dataset: false
      train: false
      eval: true
    sanity_compile:
      - trainer/data/trajectory.py
      - trainer/models/selfsup_encoder.py
      - trainer/selfsup_train.py
    eval:
      mode: selfsup
      config: configs/experiments/p31_selfsup.yaml
      max_steps: 80

  - id: quick_selfsup_p33
    name: quick_selfsup_p33
    backend: sim
    policy: selfsup_p33
    experiment_type: selfsup_p33
    seed_mode: regression_fixed
    seed_set_name: contract_regression
    seeds:
      - AAAAAAA
      - BBBBBBB
      - CCCCCCC
    gate_flag: RunFast
    modes:
      quick: true
      gate: true
      nightly: true
    stages:
      sanity: true
      gate: false
      dataset: false
      train: false
      eval: true
    sanity_compile:
      - trainer/self_supervised/datasets.py
      - trainer/self_supervised/models.py
      - trainer/self_supervised/train.py
      - trainer/experiments/selfsupervised_p33.py
    eval:
      mode: selfsup_p33
      config: configs/experiments/p33_selfsup.yaml
      max_samples: 240

  - id: quick_selfsup_future_value
