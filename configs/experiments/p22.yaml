schema: p22_experiment_config_v1

budget:
  max_wall_time_minutes: 120
  max_episodes: 500
  max_seeds: 12
  max_concurrent_workers: 1

seeds:
  base_seed: P22BASE
  regression_fixed:
    - AAAAAAA
    - BBBBBBB
    - CCCCCCC
    - DDDDDDD
    - EEEEEEE
    - FFFFFFF
    - GGGGGGG
    - HHHHHHH
  extra_random: 4

matrix:
  - id: quick_baseline
    name: quick_baseline
    backend: sim
    policy: baseline
    seed_mode: regression_fixed
    gate_flag: RunFast
    stages:
      sanity: true
      gate: true
      dataset: false
      train: false
      eval: true
    eval:
      mode: synthetic
      primary_metric_bias: 0.000

  - id: quick_candidate
    name: quick_candidate
    backend: sim
    policy: candidate
    seed_mode: nightly
    gate_flag: RunFast
    stages:
      sanity: true
      gate: true
      dataset: false
      train: false
      eval: true
    eval:
      mode: synthetic
      primary_metric_bias: 0.030

evaluation:
  primary_metric: score
  gates:
    baseline_gate: RunFast
  promotion:
    min_delta: 0.010
    require_all_gates_pass: true
