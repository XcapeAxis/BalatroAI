      replay_mix: 0.15
      arena_failures: 0.05
    reward:
      survival_bonus: 1.0
      score_delta_weight: 0.5
      invalid_action_penalty: 0.15
    rollout:
      max_steps: 80
    difficulty:
      max_ante: 0
      stake: WHITE

  stage2_midgame:
    source_sampling_weights:
      self_play: 0.65
      replay_mix: 0.20
      arena_failures: 0.15
    reward:
      score_delta_weight: 1.0
      survival_bonus: 0.35
      invalid_action_penalty: 0.12
    rollout:
      max_steps: 150
    difficulty:
      max_ante: 1
      stake: WHITE

  stage3_highrisk:
    source_sampling_weights:
      self_play: 0.50
      replay_mix: 0.20
      arena_failures: 0.30
    reward:
      score_delta_weight: 1.5
      survival_bonus: 0.10
      invalid_action_penalty: 0.20
    rollout:
      max_steps: 300
    difficulty:
      max_ante: 2
      stake: WHITE
