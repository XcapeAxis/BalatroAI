      bucket_quota_caps:
        invalid_or_wasted_decision: 4
        stateful_joker_misplay: 2
        position_sensitive_misplay: 2
    self_imitation:
      enabled: false
      replay_ratio: 0.0
    rollout:
      max_steps: 110
    difficulty:
      max_ante: 0
      stake: WHITE

  pressure:
