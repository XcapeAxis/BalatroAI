schema: p42_ppo_lite_config_v1

output_artifacts_root: docs/artifacts/research/r2s2_training

seeds:
  - AAAAAAA
  - BBBBBBB

env:
  backend: sim
  timeout_sec: 8.0
  max_steps_per_episode: 180
  max_auto_steps: 8
  max_ante: 0
  auto_advance: true
  reward:
    score_delta_weight: 0.88
    survival_bonus: 0.05
    terminal_win_bonus: 0.8
    terminal_loss_penalty: 0.8
    invalid_action_penalty: 0.1
    clip_abs: 2.5
    penalize_requested_invalid: true
    invalid_action_mode: fallback_first_legal

rollout:
  episodes_per_seed: 4
  max_steps_per_episode: 110
  total_steps_cap: 960
  early_stop_invalid_rate: 0.40
  min_steps_before_early_stop: 64

evaluation:
  seeds:
    - AAAAAAA
    - BBBBBBB
    - CCCCCCC
    - DDDDDDD
  episodes_per_seed: 1
  max_steps_per_episode: 120
  greedy: true
  out_root: docs/artifacts/research/r2s2_eval

diagnostics:
  out_root: docs/artifacts/research/r2s2_diagnostics
  action_topk: 16

hard_case_sampling:
  enabled: true
  failure_pack_manifest: ""
  max_failure_cases: 56
  max_failure_seeds: 4
  seed_replay_factor: 3
  include_base_seed: true
  preserve_seed_identity: true
  prioritize_failure_types:
    - champion_regression_segment
    - low_score_quantile
    - high_risk_bucket_failure
  balance_across_failure_types: true
  max_failures_per_type: 3
  max_failures_per_seed: 2
  replay_weight_scale: 1.15
  bucket_sampling_weights:
    early_collapse: 1.30
    resource_pressure_misplay: 1.25
    discard_mismanagement: 1.10
    shop_or_economy_misallocation: 1.05
    risk_overcommit: 1.20
    risk_undercommit: 1.00
    low_score_survival: 0.80
  bucket_quota_caps:
    invalid_or_wasted_decision: 4
    position_sensitive_misplay: 2
    stateful_joker_misplay: 2
    low_score_survival: 10

self_imitation:
  enabled: false
  replay_ratio: 0.0

train:
  ppo_epochs: 2
  minibatch_size: 64
  clip_range: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  entropy_coef: 0.01
  value_coef: 0.5
  lr: 0.00025
  grad_clip_norm: 0.5
  normalize_advantage: true
  max_updates: 3
  invalid_action_warn_threshold: 0.12
  max_kl_warn: 0.20
  nan_fail_fast: true
