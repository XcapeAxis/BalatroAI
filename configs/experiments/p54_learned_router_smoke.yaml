schema: p54_learned_router_campaign_config_v1

device_profile: single_gpu_mainline

runtime:
  device_profile: single_gpu_mainline

monitoring:
  readiness_guard: true
  dashboard: true

campaign:
  force_rerun_stages: []

registry:
  training_mode: p54_learned_router
  training_mode_category: mainline
  notes: auto_registered_from_p54_learned_router_train

controllers:
  policy_model_path: ""
  world_model_checkpoint: ""
  search:
    max_branch: 80
    max_depth: 2
    time_budget_ms: 15.0
  wm_rerank:
    top_k: 4
    horizon: 1
    uncertainty_penalty: 0.55

routing:
  router:
    policy_margin_high: 0.20
    policy_margin_low: 0.08
    policy_entropy_high: 1.25
    wm_uncertainty_prefer_max: 0.80
    wm_uncertainty_disable: 1.20
    search_budget_min_level: medium
    high_risk_search_bonus: 0.75
    late_stage_search_bonus: 0.50
    wm_reward_bonus_scale: 0.20
  rule_guard:
    min_confidence: 0.45
    high_risk_min_confidence: 0.60
    min_feature_completeness: 0.80
    max_ood_score: 6.0
    max_wm_uncertainty: 1.0
  learned_router:
    temperature: 1.0
    device: auto

dataset:
  quick: true
  max_trace_files: 8
  max_samples: 768
  allow_rule_labels: true
  min_label_confidence: 0.20
  artifacts_root: docs/artifacts/p54/router_dataset

train:
  quick: true
  seed: 5201
  epochs: 4
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  top_k: 2
  val_fraction: 0.2
  class_weighting: inverse_freq
  checkpoint_metric: top1_accuracy
  require_cuda: true
  artifacts_root: docs/artifacts/p54/router_train

inference_smoke:
  seed: AAAAAAA
  max_states: 8

arena_compare:
  backend: sim
  mode: long_episode
  episodes_per_seed: 1
  max_steps: 120
  timeout_sec: 7200
  policies:
    - policy_baseline
    - policy_plus_wm_rerank
    - hybrid_controller_rule
    - hybrid_controller_learned
    - hybrid_controller_learned_with_rule_guard
    - search_baseline
    - heuristic_baseline
  champion_policy: hybrid_controller_rule
  candidate_policy: hybrid_controller_learned_with_rule_guard

triage:
  output_artifacts_root: docs/artifacts/p54/triage

output:
  router_inference_root: docs/artifacts/p54/router_inference
  arena_ablation_root: docs/artifacts/p54/arena_ablation
