schema: p42_ppo_lite_config_v1

output_artifacts_root: docs/artifacts/research/r2s3_training
curriculum_config: configs/experiments/r2s3_p44_curriculum_bucketed.yaml

seeds:
  - AAAAAAA
  - BBBBBBB

env:
  backend: sim
  timeout_sec: 8.0
  max_steps_per_episode: 220
  max_auto_steps: 8
  max_ante: 0
  auto_advance: true
  reward:
    score_delta_weight: 0.92
    survival_bonus: 0.05
    terminal_win_bonus: 0.80
    terminal_loss_penalty: 0.80
    invalid_action_penalty: 0.12
    clip_abs: 2.5
    penalize_requested_invalid: true
    invalid_action_mode: fallback_first_legal

rollout:
  episodes_per_seed: 6
  max_steps_per_episode: 145
  total_steps_cap: 1800
  early_stop_invalid_rate: 0.35
  min_steps_before_early_stop: 64

evaluation:
  seeds:
    - AAAAAAA
    - BBBBBBB
  episodes_per_seed: 1
  max_steps_per_episode: 180
  greedy: true
  out_root: docs/artifacts/research/r2s3_eval

diagnostics:
  out_root: docs/artifacts/research/r2s3_diagnostics
  action_topk: 16

hard_case_sampling:
  enabled: true
  failure_pack_manifest: ""
  max_failure_cases: 96
  max_failure_seeds: 8
  seed_replay_factor: 4
  include_base_seed: true
  preserve_seed_identity: true
  prioritize_failure_types:
    - champion_regression_segment
    - low_score_quantile
    - high_risk_bucket_failure
  balance_across_failure_types: true
  max_failures_per_type: 6
  max_failures_per_seed: 3
  replay_weight_scale: 1.20
  bucket_sampling_weights:
    discard_mismanagement: 1.30
    resource_pressure_misplay: 1.22
    shop_or_economy_misallocation: 1.15
    risk_overcommit: 1.15
    risk_undercommit: 1.12
    early_collapse: 0.82
  bucket_quota_caps:
    discard_mismanagement: 16
    resource_pressure_misplay: 14
    shop_or_economy_misallocation: 10
    risk_overcommit: 10
    risk_undercommit: 10
    early_collapse: 8
  slice_sampling_weights:
    slice_stage:early: 1.18
    slice_action_type:discard: 1.28
    slice_resource_pressure:medium: 1.18
  slice_quota_caps:
    slice_stage:early: 24
    slice_action_type:discard: 20
  risk_tag_sampling_weights:
    early_collapse: 0.82
    resource_balanced: 1.10
    resource_tight: 1.18

self_imitation:
  enabled: true
  stage_min: balance_or_exploit
  replay_ratio: 0.03
  top_k_episodes: 2
  max_replay_steps: 48
  min_episode_score: 90.0
  min_episode_reward: 3.0
  max_invalid_action_rate: 0.01
  selection_metric: final_score
  quality_threshold: 90.0
  slice_allowlist:
    - slice_stage:early
  phase_allowlist:
    - SELECTING_HAND
  action_type_allowlist:
    - PLAY
    - DISCARD

train:
  ppo_epochs: 2
  minibatch_size: 64
  clip_range: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  entropy_coef: 0.01
  value_coef: 0.5
  lr: 0.00025
  grad_clip_norm: 0.5
  normalize_advantage: true
  max_updates: 3
  invalid_action_warn_threshold: 0.12
  max_kl_warn: 0.20
  nan_fail_fast: true
