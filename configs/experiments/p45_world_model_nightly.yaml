schema: p45_world_model_config_v1
run_id: ""
dataset:
  feature_dim: 48
  action_vocab_size: 4096
  split:
    train: 0.9
  representation:
    cache_latents: true
    latent_dim: 64
    hidden_dim: 128
    dropout: 0.05
    seed: 4501
  sources:
    - id: p42_rollout_nightly
      type: rl_rollout
      path: docs/artifacts/p42/rollouts
      max_files: 4
      max_samples: 1600
    - id: p44_rollout_nightly
      type: rl_rollout
      path: docs/artifacts/p44/rollouts
      max_files: 4
      max_samples: 1600
    - id: p36_selfsup_dataset_nightly
      type: selfsup_dataset
      path: docs/artifacts/p36/selfsup_datasets
      max_files: 4
      max_samples: 2000
    - id: p41_replay_mix_nightly
      type: replay_manifest
      path: docs/artifacts/p41/replay_mixer
      max_files: 3
      max_samples: 1800
    - id: p13_real_trace_nightly
      type: trace_jsonl
      path: docs/artifacts/p13
      max_files: 3
      max_samples: 1200
  output:
    artifacts_root: docs/artifacts/p45/wm_dataset
model:
  input_dim: 48
  latent_dim: 64
  hidden_dim: 128
  action_embed_dim: 48
  dropout: 0.1
  action_vocab_size: 4096
  resource_dim: 5
train:
  seed: 4501
  epochs: 8
  batch_size: 128
  lr: 0.0007
  weight_decay: 0.00001
  grad_clip_norm: 1.0
  checkpoint_metric: val_total_loss
  max_train_samples: 4096
  max_val_samples: 1024
  loss_weights:
    latent: 1.0
    reward: 1.0
    score_delta: 0.75
    resource_delta: 0.35
    uncertainty: 0.35
  output_artifacts_root: docs/artifacts/p45/wm_train
eval:
  split: val
  batch_size: 256
  output_artifacts_root: docs/artifacts/p45/wm_eval
  diagnostics_topk: 16
planning:
  enabled: true
  assist_mode: one_step_heuristic
  weight: 0.4
  uncertainty_penalty: 0.65
arena_compare:
  enabled: true
  candidate_policy: heuristic_wm_assist
  champion_policy: heuristic_baseline
  episodes_per_seed: 2
  max_steps: 180
  output_artifacts_root: docs/artifacts/p45/wm_assist_compare
  seeds:
    - AAAAAAA
    - BBBBBBB
    - CCCCCCC
    - DDDDDDD
output:
  artifacts_root: docs/artifacts/p45
