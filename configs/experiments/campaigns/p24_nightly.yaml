{
  "campaign_id": "p24_nightly_campaign",
  "mode": "nightly",
  "seed_policy_config": "configs/experiments/seeds_p23.yaml",
  "budget": {
    "max_wall_time_minutes": 180,
    "max_parallel": 1,
    "max_experiments": 5,
    "max_retries": 1
  },
  "stages": [
    {
      "stage_id": "exploration",
      "purpose": "exploration",
      "matrix_ref": "configs/experiments/p23.yaml",
      "mode": "quick",
