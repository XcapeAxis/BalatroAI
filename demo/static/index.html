<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BalatroAI 决策沙盘演示</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%230e7c66'/%3E%3Cstop offset='100%25' stop-color='%23d3a046'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='url(%23g)'/%3E%3Ctext x='32' y='41' font-size='28' text-anchor='middle' fill='white' font-family='Bahnschrift,Segoe UI Variable,Arial'%3EB%3C/text%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/static/app.css?v=20260310s5r2" />
  </head>
  <body>
    <div id="app" class="app-shell" data-view-mode="overview" data-focus-panel="preview">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-mark">B</div>
          <div>
            <p class="eyebrow">BalatroAI 本地演示</p>
            <h1>本地 AI 决策沙盘</h1>
          </div>
        </div>

        <div class="topbar-statuses">
          <div class="topbar-status">
            <span class="topbar-label">当前场景</span>
            <strong id="status-scenario">-</strong>
            <small id="scenario-focus-inline">-</small>
          </div>
          <div class="topbar-status">
            <span class="topbar-label">当前模型</span>
            <strong id="status-model">-</strong>
            <small id="status-run-id">-</small>
          </div>
        </div>

        <small id="status-message" class="topbar-feedback" aria-live="polite"></small>

        <div class="topbar-actions">
          <button id="reload-button" class="secondary">
            <span class="button-icon" data-icon="refresh"></span>
            重置
          </button>
          <button id="autoplay-button" class="accent">
            <span class="button-icon" data-icon="spark"></span>
            自动演示
          </button>
          <button id="step-button" class="primary">
            <span class="button-icon" data-icon="play"></span>
            执行当前动作
          </button>
          <div class="theme-toggle" id="theme-toggle" title="切换浅色 / 深色模式"></div>
        </div>
      </header>

      <div class="stage-shell">
        <main class="workspace-grid">
          <section class="panel scenario-panel" data-panel="scenario">
            <div class="panel-header">
              <div class="panel-title-block">
                <span class="panel-icon" data-icon="scene"></span>
                <div>
                  <h3>场景选择</h3>
                </div>
              </div>
            </div>
            <div class="panel-scroll scenario-scroll">
              <div id="scenario-list" class="scenario-list"></div>
            </div>
          </section>

          <section class="panel board-panel" data-panel="board">
            <div class="panel-header">
              <div class="panel-title-block">
                <span class="panel-icon" data-icon="stage"></span>
                <div>
                  <h3>当前局面</h3>
                </div>
              </div>
              <div id="insight-tags" class="panel-note"></div>
            </div>

            <div class="panel-scroll board-scroll">
              <div id="stage-spotlight" class="stage-spotlight"></div>
              <div id="resource-grid" class="metric-grid"></div>

              <div class="subgrid">
                <div class="panel nested-panel">
                  <div class="nested-header">
                    <div class="panel-title-block inline">
                      <span class="panel-icon small" data-icon="hand"></span>
                      <div>
                        <h4>手牌区</h4>
                        <p id="hand-meta" class="muted">-</p>
                      </div>
                    </div>
                    <small class="muted">高亮表示当前动作真正会用到哪些牌</small>
                  </div>
                  <div id="hand-cards" class="card-grid"></div>
                </div>

                <div class="side-stack">
                  <div class="panel nested-panel">
                    <div class="nested-header">
                      <div class="panel-title-block inline">
                        <span class="panel-icon small" data-icon="joker"></span>
                        <div>
                          <h4>Joker / 机制</h4>
                          <p class="muted">解释为什么这手牌的价值会被放大。</p>
                        </div>
                      </div>
                    </div>
                    <div id="joker-list" class="tag-stack"></div>
                  </div>
                </div>
              </div>
              <div id="state-summary-card" class="summary-card"></div>
            </div>
          </section>

          <section class="panel decision-panel" data-panel="decision">
            <div class="panel-header">
              <div class="panel-title-block">
                <span class="panel-icon" data-icon="compare"></span>
                <div>
                  <h3>模型 vs 启发式</h3>
                </div>
              </div>
            </div>

            <div class="panel-scroll decision-scroll">
              <div id="compare-summary" class="compare-summary-card"></div>
              <div id="selected-action-card" class="selected-action-card"></div>

              <div class="compare-columns">
                <div class="compare-column">
                  <div class="compare-title">
                    <span class="compare-badge model">
                      <span class="button-icon" data-icon="model"></span>
                      训练模型
                    </span>
                    <small>更像演示里的 AI 助手，会同时考虑收益、阶段和解释性。</small>
                  </div>
                  <div id="recommendations-model" class="recommendation-list"></div>
                </div>
                <div class="compare-column">
                  <div class="compare-title">
                    <span class="compare-badge heuristic">
                      <span class="button-icon" data-icon="heuristic"></span>
                      启发式基线
                    </span>
                    <small>用来回答“如果没有训练模型，系统通常会怎么走”。</small>
                  </div>
                  <div id="recommendations-heuristic" class="recommendation-list"></div>
                </div>
              </div>
            </div>
          </section>
        </main>

        <section class="dock-shell panel" data-panel="dock">
          <div class="dock-head">
            <div class="panel-title-block inline">
              <span class="panel-icon" data-icon="preview"></span>
              <div>
                <h3>结果与训练摘要</h3>
              </div>
            </div>
            <div class="dock-tabs" aria-label="切换聚焦模块">
              <button class="dock-tab active" data-focus-panel="preview">结果预览</button>
              <button class="dock-tab" data-focus-panel="timeline">时间线</button>
              <button class="dock-tab" data-focus-panel="training">训练成果</button>
            </div>
          </div>

          <div class="dock-grid">
            <section class="panel dock-panel preview-panel" data-panel="preview">
              <div class="panel-header compact">
                <div class="panel-title-block inline">
                  <span class="panel-icon small" data-icon="result"></span>
                  <div>
                    <h3>一步结果预览</h3>
                  </div>
                </div>
              </div>
              <div class="panel-scroll preview-scroll">
                <div id="preview-focus" class="preview-focus-card"></div>
                <div id="preview-summary" class="preview-summary"></div>
                <div id="preview-delta" class="metric-grid"></div>
              </div>
            </section>

            <section class="panel dock-panel timeline-panel" data-panel="timeline">
              <div class="panel-header compact">
                <div class="panel-title-block inline">
                  <span class="panel-icon small" data-icon="timeline"></span>
                  <div>
                    <h3>时间线</h3>
                  </div>
                </div>
              </div>
              <div class="panel-scroll timeline-scroll">
                <div id="timeline" class="timeline"></div>
              </div>
            </section>

            <section class="panel dock-panel training-panel" data-panel="training">
              <div class="panel-header compact">
                <div class="panel-title-block inline">
                  <span class="panel-icon small" data-icon="training"></span>
                  <div>
                    <h3>训练成果</h3>
                  </div>
                </div>
                <div class="training-actions">
                  <button
                    id="train-standard-button"
                    class="primary subtle"
                    title="后台启动一次 2 小时预算内的正式训练"
                  >
                    <span class="button-icon" data-icon="rocket"></span>
                    开始 2 小时训练
                  </button>
                  <button
                    id="train-smoke-button"
                    class="secondary subtle"
                    title="快速验证训练链路是否正常"
                  >
                    <span class="button-icon" data-icon="flask"></span>
                    快速烟雾训练
                  </button>
                </div>
              </div>

              <div class="panel-scroll training-scroll">
                <div id="training-result-card" class="training-result-card"></div>
                <div id="training-status-card" class="training-status-card"></div>
                <div id="model-meta" class="metric-grid training-meta-grid"></div>

                <div class="chart-stack">
                  <div id="training-chart" class="chart-shell"></div>
                  <div id="training-side-notes" class="side-notes"></div>
                </div>
              </div>
            </section>
          </div>
        </section>
      </div>
    </div>

    <div id="toast-root" class="toast-root" aria-live="polite"></div>

    <template id="metric-template">
      <div class="metric-card">
        <div class="metric-body">
          <span class="metric-label"></span>
          <strong class="metric-value"></strong>
          <small class="metric-subvalue"></small>
        </div>
      </div>
    </template>

    <script src="/static/app.js?v=20260310s5r2"></script>
  </body>
</html>
